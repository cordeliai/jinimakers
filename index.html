<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>디지털 명함 - 김유진</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap');

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #fcfcfc;
            font-family: 'Noto Sans KR', sans-serif;
            color: #333;
        }

        .business-card {
            background-color: #ffffff;
            width: 340px; /* 불필요한 여백을 줄여 더 콤팩트하게 */
            padding: 0 0 30px 0;
            box-sizing: border-box;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            overflow: hidden;
            text-align: center;
        }

        .top-bar {
            height: 6px; /* 더 얇게 수정 */
            background-color: #df6928;
            width: 100%;
            margin-bottom: 25px;
        }

        .card-content {
            padding: 0 28px;
        }

        .logo-container { margin-bottom: 20px; }
        .logo-container img { width: 140px; height: auto; opacity: 0.85; }

        .qr-section {
            background-color: #fff;
            padding: 8px;
            border: 1px solid #f0f0f0; /* 선을 더 연하게 */
            border-radius: 16px;
            display: inline-block;
            margin-bottom: 20px;
        }
        .qr-section img { width: 110px; height: 110px; display: block; }

        .profile { margin-bottom: 12px; }
        
        /* ✨ 이름 자간 및 스타일 수정 */
        .name { 
            font-size: 1.5rem; 
            font-weight: 700; 
            margin: 0 0 4px 0; 
            color: #111; 
            letter-spacing: 0.4rem; /* 자간을 대폭 넓혀 고급스럽게 */
            text-indent: 0.4rem; /* 자간 때문에 생기는 오른쪽 쏠림 방지 */
        }
        .company { font-size: 0.85rem; font-weight: 400; color: #888; margin: 0; }

        .divider { width: 25px; height: 1px; background-color: #df6928; margin: 15px auto; opacity: 0.4; }

        .contact-info { text-align: left; font-size: 0.85rem; line-height: 1.6; }

        .info-item {
            display: flex;
            align-items: center;
            margin-bottom: 6px;
            text-decoration: none;
            color: #555;
            padding-bottom: 2px;
        }

        .info-item .label {
            width: 18px;
            font-weight: 700;
            color: #df6928;
            margin-right: 12px;
            flex-shrink: 0;
            font-size: 0.75rem;
        }

        .address-box {
            margin-top: 10px;
            text-align: left;
            font-size: 0.75rem;
            color: #999;
            line-height: 1.4;
            display: flex;
            margin-bottom: 25px;
        }
        .address-box .label {
            width: 18px;
            font-weight: 700;
            color: #df6928;
            margin-right: 12px;
            flex-shrink: 0;
        }

        /* 🛠 극강의 심플함을 추구한 버튼 그룹 */
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 6px;
        }

        .action-btn {
            flex: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-weight: 500;
            padding: 7px 0;
            border-radius: 50px; /* 완전한 캡슐형 */
            font-size: 0.65rem; /* 작고 정갈하게 */
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
            border: 1px solid #df6928; /* 모든 버튼 아웃라인 통일 */
            color: #df6928;
            background-color: transparent;
            cursor: pointer;
        }

        .action-btn span {
            font-size: 0.8rem;
            margin-right: 4px;
        }

        /* 터치 시 살짝 피드백 */
        .action-btn:active {
            background-color: rgba(223, 105, 40, 0.05);
            transform: scale(0.97);
        }

        .links { margin-top: 5px; }
        
    </style>
</head>
<body>

<div class="business-card">
    <div class="top-bar"></div>

    <div class="card-content">
        <div class="logo-container">
            <img src="COS_로고_영문.png" alt="COde_Studio 로고">
        </div>

        <div class="qr-section">
            <img src="25kS9.png" alt="코드스튜디오 해운대센터 QR코드">
        </div>

        <div class="profile">
            <p class="name">김유진</p>
            <p class="company">지니메이커스 | 코드스튜디오 해운대센터</p>
        </div>

        <div class="divider"></div>

        <div class="contact-info">
            <a href="tel:01065581165" class="info-item">
                <span class="label">M</span>
                <span class="value">010.6558.1165</span>
            </a>
            <a href="mailto:jinimakers@kakao.com" class="info-item">
                <span class="label">E</span>
                <span class="value">jinimakers@kakao.com</span>
            </a>
            <div class="links">
                <a href="https://blog.naver.com/forceysh" class="info-item" target="_blank">
                    <span class="label">B</span>
                    <span class="value">blog.naver.com/forceysh</span>
                </a>
                <a href="https://www.instagram.com/codestudio_hd/" class="info-item" target="_blank">
                    <span class="label">I</span>
                    <span class="value">instagram.com/codestudio_hd/</span>
                </a>
            </div>
        </div>

        <div class="address-box">
            <span class="label">A</span>
            <span class="value">
                부산광역시 해운대구 마린시티 2로 2<br>
                마린파크 303호
            </span>
        </div>

        <div class="btn-group">
            <a href="#" onclick="shareCard()" class="action-btn">
                <span>🔗</span> SHARE
            </a>
            <a href="김유진-디지털명함(세로).png" download="김유진-디지털명함(세로).png" class="action-btn">
                <span>📥</span> DOWN
            </a>
            <a href="#" onclick="downloadVCard()" class="action-btn">
                <span>💾</span> SAVE
            </a>
        </div>
    </div>
</div>

<script>
function shareCard() {
    if (navigator.share) {
        navigator.share({
            title: '김유진 디지털 명함',
            url: window.location.href,
        }).catch(console.error);
    } else {
        const t = document.createElement("input");
        document.body.appendChild(t);
        t.value = window.location.href;
        t.select();
        document.execCommand("copy");
        document.body.removeChild(t);
        alert("링크가 복사되었습니다.");
    }
}

function downloadVCard() {
    const v = "BEGIN:VCARD\nVERSION:3.0\nFN:김유진\nORG:코드스튜디오\nTEL;TYPE=CELL:01065581165\nEMAIL:jinimakers@kakao.com\nURL:" + window.location.href + "\nEND:VCARD";
    const b = new Blob([v], { type: "text/vcard;charset=utf-8" });
    const u = window.URL.createObjectURL(b);
    const a = document.createElement("a");
    a.download = "김유진_연락처.vcf";
    a.href = u;
    a.click();
}
</script>

</body>
</html>
