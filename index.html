<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>디지털 명함 - 김유진</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap');

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f8f9fa;
            font-family: 'Noto Sans KR', sans-serif;
            color: #222;
        }

        .business-card {
            background-color: #ffffff;
            width: 360px;
            padding: 0 0 40px 0;
            box-sizing: border-box;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            overflow: hidden;
            text-align: center;
        }

        .top-bar {
            height: 10px;
            background-color: #df6928;
            width: 100%;
            margin-bottom: 30px;
        }

        .card-content {
            padding: 0 35px;
        }

        .logo-container { margin-bottom: 25px; }
        .logo-container img { width: 170px; height: auto; opacity: 0.9; }

        .qr-section {
            background-color: #fff;
            padding: 12px;
            border: 1.5px solid #eee;
            border-radius: 18px;
            display: inline-block;
            margin-bottom: 25px;
        }
        .qr-section img { width: 130px; height: 130px; display: block; }

        .profile { margin-bottom: 20px; }
        .name { font-size: 1.7rem; font-weight: 700; margin: 0 0 4px 0; color: #111; letter-spacing: -0.5px; }
        .company { font-size: 0.95rem; font-weight: 400; color: #777; margin: 0; }

        .divider { width: 30px; height: 2px; background-color: #df6928; margin: 18px auto; opacity: 0.6; }

        .contact-info { text-align: left; font-size: 0.95rem; line-height: 1.8; }

        .info-item {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            text-decoration: none;
            color: #444;
            transition: all 0.2s;
            border-bottom: 1px solid #f8f8f8;
            padding-bottom: 4px;
        }

        .info-item:active { color: #df6928; }

        .info-item .label {
            width: 22px;
            font-weight: 700;
            color: #df6928;
            margin-right: 12px;
            flex-shrink: 0;
            font-size: 0.85rem;
        }

        .address-box {
            margin-top: 15px;
            text-align: left;
            font-size: 0.85rem;
            color: #888;
            line-height: 1.5;
            display: flex;
            margin-bottom: 30px;
        }
        .address-box .label {
            width: 22px;
            font-weight: 700;
            color: #df6928;
            margin-right: 12px;
            flex-shrink: 0;
        }

        /* ✨ 세련된 SAVE 버튼 디자인 */
        .download-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: transparent;
            color: #df6928;
            text-decoration: none;
            font-weight: 500;
            padding: 8px 35px; /* SAVE 글자에 맞춰 패딩 조정 */
            border: 1.2px solid #df6928;
            border-radius: 50px;
            font-size: 0.85rem;
            letter-spacing: 1px; /* 영문 SAVE의 세련미를 위해 자간 확대 */
            transition: all 0.3s ease;
            margin-top: 5px;
        }

        .download-btn:hover, .download-btn:active {
            background-color: #df6928;
            color: #ffffff;
            box-shadow: 0 5px 15px rgba(223, 105, 40, 0.2);
        }

        .links { margin-top: 5px; }
        
    </style>
</head>
<body>

<div class="business-card">
    <div class="top-bar"></div>

    <div class="card-content">
        <div class="logo-container">
            <img src="COS_로고_영문.png" alt="COde_Studio 로고">
        </div>

        <div class="qr-section">
            <img src="25kS9.png" alt="코드스튜디오 해운대센터 QR코드">
        </div>

        <div class="profile">
            <p class="name">김유진</p>
            <p class="company">지니메이커스 | 코드스튜디오 해운대센터</p>
        </div>

        <div class="divider"></div>

        <div class="contact-info">
            <a href="tel:01065581165" class="info-item">
                <span class="label">M</span>
                <span class="value">010.6558.1165</span>
            </a>

            <a href="mailto:jinimakers@kakao.com" class="info-item">
                <span class="label">E</span>
                <span class="value">jinimakers@kakao.com</span>
            </a>
            
            <div class="links">
                <a href="https://blog.naver.com/forceysh" class="info-item" target="_blank">
                    <span class="label">B</span>
                    <span class="value">blog.naver.com/forceysh</span>
                </a>
                <a href="https://www.instagram.com/codestudio_hd/" class="info-item" target="_blank">
                    <span class="label">I</span>
                    <span class="value">instagram.com/codestudio_hd/</span>
                </a>
            </div>
        </div>

        <div class="address-box">
            <span class="label">A</span>
            <span class="value">
                부산광역시 해운대구 마린시티 2로 2<br>
                마린파크 303호
            </span>
        </div>

        <a href="김유진-디지털명함(세로).png" download="김유진-디지털명함(세로).png" class="download-btn">
            SAVE
        </a>
    </div>
</div>

</body>
</html>
